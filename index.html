<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TFT Patch 16.6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Noto Sans SC',sans-serif;}

/* ── 16:9 stage ── */
#stage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);overflow:hidden;}

/* ── pages container ── */
#pages{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ── Header right section ── */
#header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
#current-time{font-family:'Rajdhani',sans-serif;font-weight:600;color:#8891AA;letter-spacing:.08em;font-size:.8em;}

.page{
  position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0;pointer-events:none;
  transition:opacity 0.7s cubic-bezier(0.4,0,0.2,1);
}
.page.active{opacity:1;pointer-events:all;}

/* ══════════════════════════════════════
   PAGE 1 — bubble chart (existing canvas)
══════════════════════════════════════ */
#p1{background:#0A0C14;}
#p1 canvas{position:absolute;top:0;left:0;}
#p1 #header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;}
#title-block{display:flex;flex-direction:column;justify-content:flex-end;}
#title-block h1{font-family:'Rajdhani',sans-serif;font-weight:700;color:#fff;letter-spacing:.1em;display:flex;align-items:baseline;gap:12px;}
#title-block h1 em{color:#C8A84B;font-style:normal;}
#title-block h1 .by-author{font-size:.42em;color:#3A4060;letter-spacing:.14em;font-weight:500;text-transform:uppercase;}
#title-block .byline{font-size:.6em;color:#2E3450;letter-spacing:.16em;text-transform:uppercase;margin-top:3px;}
#filters{display:flex;gap:8px;align-items:center;}
.tier-btn{padding:5px 18px;border-radius:4px;border:1.5px solid;background:transparent;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85em;letter-spacing:.12em;cursor:pointer;transition:background .2s,opacity .2s,transform .12s;outline:none;}
.tier-btn:hover{transform:translateY(-1px);}
.tier-btn.dimmed{opacity:.22;}
.all-btn{padding:5px 16px;border-radius:4px;border:1.5px solid #303550;background:transparent;color:#606880;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.82em;letter-spacing:.1em;cursor:pointer;transition:all .2s;outline:none;}
.all-btn:hover{border-color:#8891AA;color:#ccc;}
.all-btn.active{border-color:#8891AA;background:rgba(136,145,170,.1);color:#fff;}
#p1 #size-legend{position:absolute;right:28px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.sl-title{font-size:.6em;color:#303550;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;}
.sl-items{display:flex;align-items:flex-end;gap:8px;}
.sl-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sl-circle{border-radius:50%;background:rgba(136,145,170,.15);border:1px solid rgba(136,145,170,.3);}
.sl-label{font-size:.6em;color:#303550;font-family:'Rajdhani',sans-serif;}
#tooltip{position:absolute;pointer-events:none;opacity:0;transition:opacity .15s;background:rgba(10,12,20,.97);border:1px solid #1E2235;border-radius:10px;padding:13px 16px;min-width:215px;box-shadow:0 10px 40px rgba(0,0,0,.7);z-index:50;}
#tooltip.show{opacity:1;}
.tt-name{font-size:.88em;font-weight:700;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid #1E2235;}
.tt-row{display:flex;justify-content:space-between;font-size:.72em;color:#3A4060;margin-bottom:4px;gap:14px;}
.tt-row b{color:#B0B8C8;font-weight:500;}
.tt-divider{border:none;border-top:1px solid #1E2235;margin:8px 0;}
.tt-diff{font-size:.72em;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.diff-label{color:#3A4060;}
.diff-pill{padding:2px 10px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95em;letter-spacing:.1em;}
.tt-tier{margin-top:8px;padding:3px 10px;border-radius:3px;display:inline-block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8em;letter-spacing:.12em;}

/* ══════════════════════════════════════
   PAGE 2 — tier overview list
══════════════════════════════════════ */
#p2{background:#0D1020;}
#p2 .p2-inner{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  padding:0;
}
#p2 .p2-title-bar{
  display:flex;align-items:baseline;gap:16px;
  padding:0 56px;flex-shrink:0;
}
#p2 .p2-title-bar h2{
  font-family:'Rajdhani',sans-serif;font-weight:700;color:#fff;letter-spacing:.12em;
}
#p2 .p2-title-bar em{color:#C8A84B;font-style:normal;}
#p2 .p2-title-bar .p2-sub{font-size:.52em;color:#2E3450;letter-spacing:.18em;text-transform:uppercase;}

#p2 .tier-rows{
  flex:1;display:flex;flex-direction:column;
  padding:0 56px;gap:0;overflow:hidden;
}

.tier-row{
  flex:1;display:flex;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.04);
  gap:0;min-height:0;
}
.tier-row:last-child{border-bottom:none;}

.tier-badge{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.06em;
  border-radius:6px;
}
.tier-badge .badge-key{line-height:1;}
.tier-badge .badge-sub{font-size:.38em;letter-spacing:.2em;text-transform:uppercase;opacity:.7;margin-top:2px;}

.tier-divider{width:1px;background:rgba(255,255,255,.06);align-self:stretch;flex-shrink:0;margin:12px 0;}

.tier-comps{
  flex:1;display:flex;align-items:center;
  gap:0;overflow:hidden;padding-left:0;
}

.comp-card{
  display:flex;flex-direction:column;align-items:center;
  cursor:default;transition:transform .2s;
  flex-shrink:0;
}
.comp-card:hover{transform:translateY(-3px);}

.comp-avatar{
  border-radius:50%;overflow:hidden;
  border:2px solid transparent;
  flex-shrink:0;
  background:#1a1c28;
}
.comp-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

.comp-name{
  font-size:.6em;color:#8891AA;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:4px;
}

.comp-stats{
  display:flex;gap:6px;margin-top:2px;
}
.stat-chip{
  font-family:'Rajdhani',sans-serif;font-size:.55em;font-weight:600;
  color:rgba(255,255,255,.45);letter-spacing:.04em;
}

/* ══════════════════════════════════════
   PAGE 3–6 — tier detail pages
══════════════════════════════════════ */
.detail-page{
  background:linear-gradient(135deg, #1a2040 0%, #141830 40%, #0e1225 100%);
}

.detail-inner{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:stretch;
}

/* Left panel */
.detail-left{
  display:flex;flex-direction:column;justify-content:center;
  flex-shrink:0;padding-left:8%;
}
.detail-tier-label{
  font-family:'Rajdhani',sans-serif;font-weight:700;color:#fff;
  line-height:0.88;letter-spacing:.02em;
}
.detail-tier-label .tier-key{display:block;}
.detail-tier-label .tier-zh{display:block;font-size:.28em;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-top:8px;}
.detail-tier-desc{
  font-size:.62em;color:rgba(255,255,255,.3);
  line-height:1.7;margin-top:16px;letter-spacing:.04em;
  font-weight:300;
}
.detail-left-line{
  width:1px;align-self:stretch;
  margin:10% 0;flex-shrink:0;
}

/* Right panel */
.detail-right{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding-right:8%;overflow:hidden;
}

.detail-comp-item{
  display:flex;align-items:center;
  padding:0;
  border-bottom:1px solid rgba(255,255,255,.06);
  transition:background .2s;
}
.detail-comp-item:last-child{border-bottom:none;}

.detail-avatar{
  border-radius:10px;overflow:hidden;
  flex-shrink:0;background:#1a1c28;
}
.detail-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

.detail-comp-info{flex:1;overflow:hidden;}
.detail-comp-name{
  font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.02em;
}
.detail-comp-desc{
  color:rgba(255,255,255,.35);font-weight:300;
  letter-spacing:.02em;margin-top:3px;
  font-size:.82em;
}
.detail-comp-tags{
  display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;
}
.tag{
  font-family:'Rajdhani',sans-serif;font-size:.7em;font-weight:600;
  padding:2px 8px;border-radius:3px;letter-spacing:.08em;
}

/* ── breathing dot nav ── */
#nav-dot{
  position:absolute;
  bottom:3.5%;right:3.5%;
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.35);
  cursor:pointer;
  z-index:100;
  animation:breathe 2.8s ease-in-out infinite;
  transition:background .2s, transform .2s;
  border:none;outline:none;
}
#nav-dot:hover{
  background:rgba(255,255,255,0.75);
  transform:scale(1.5);
  animation:none;
}

/* 键盘导航提示 */
.keyboard-hint {
  position: absolute;
  bottom: 3.5%;
  right: calc(3.5% + 15px);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.7em;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.08em;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
#nav-dot:hover + .keyboard-hint {
  opacity: 1;
}


@keyframes breathe{
  0%,100%{opacity:.25;transform:scale(1);}
  50%{opacity:.65;transform:scale(1.25);}
}
</style>
</head>

    <div class="page active" id="p1">

        <div id="title-block">

    <div class="page" id="p2">

          <h2 id="p2-h2">TFT — <em>PATCH 16.6</em></h2>
          <span class="p2-sub">阵容强度总览</span>
        </div>
        <div class="tier-rows" id="tier-rows"></div>
      </div>
    </div>

    <!-- ══ PAGES 3–6: DETAIL ══ -->
    <div class="page detail-page" id="p3"><div class="detail-inner" id="di-T0"></div></div>
    <div class="page detail-page" id="p4"><div class="detail-inner" id="di-T1"></div></div>
    <div class="page detail-page" id="p5"><div class="detail-inner" id="di-T2"></div></div>
    <div class="page detail-page" id="p6"><div class="detail-inner" id="di-Trap"></div></div>

  </div><!-- /pages -->

  <!-- breathing nav dot -->
  <button id="nav-dot" title="点击或使用键盘左右键翻页"></button>
  <div class="keyboard-hint">←/→ 或 小键盘 4/6</div>
</div><!-- /stage -->

function getEff(d){ return +(d.chicken*.6+d.score*.4).toFixed(2); }
function getTier(d){
  if(d.name==='神盾使·卡莉丝塔') return 'T1';
  if(d.name==='神盾使·卡莉丝塔') return 'T1';
  const e=getEff(d);
  if(e>=5)   return 'T0';
  if(e>=2.5) return 'T1';
  if(e>=1.2) return 'T2';
  return 'Trap';
}
function getDiff(tier){
  if(tier==='T0')   return {label:'简单',  bg:'rgba(109,187,122,.18)',color:'#6DBB7A'};
  if(tier==='T1')   return {label:'稳定',  bg:'rgba(91,156,246,.18)', color:'#5B9CF6'};
  if(tier==='T2')   return {label:'有难度',bg:'rgba(200,168,75,.18)', color:'#C8A84B'};
  return                   {label:'高风险',bg:'rgba(224,92,92,.18)',  color:'#E05C5C'};
}

const DATA = RAW.map(d=>{
  const eff=getEff(d), tier=getTier(d);
  const img=new Image(); img.src=AVATARS[d.name]||'';
  return {...d,eff,tier,diff:getDiff(tier),img};
});

// group by tier in order
const TIER_ORDER = ['T0','T1','T2','Trap'];
const GROUPED = {};
TIER_ORDER.forEach(t=>{ GROUPED[t]=DATA.filter(d=>d.tier===t); });

const stage = document.getElementById('stage');
let SW, SH, DPR;

function resize(){
  DPR = window.devicePixelRatio||1;
  const vw=window.innerWidth, vh=window.innerHeight;
  if(vw/vh>16/9){SH=vh;SW=vh*16/9;}else{SW=vw;SH=vw*9/16;}
  stage.style.width=SW+'px';stage.style.height=SH+'px';

  const sc=SW/1280;
  // p1
  const cvs=document.getElementById('chart');
  cvs.style.width=SW+'px'; cvs.style.height=SH+'px';
  cvs.width=SW*DPR; cvs.height=SH*DPR;
  document.getElementById('header').style.height=(SH*.13)+'px';
  document.getElementById('header').style.padding=`0 ${40*sc}px`;
  document.getElementById('main-title').style.fontSize=(sc*24)+'px';
  // time display styling
  const timeEl = document.getElementById('current-time');
  if(timeEl){
    timeEl.style.fontSize = (sc*11)+'px';
    timeEl.style.marginBottom = (sc*4)+'px';
  }
  // 将前四率参考标识向上移动，避免与横轴重叠
  document.getElementById('size-legend').style.bottom=(SH*.1+16)+'px';
  document.getElementById('size-legend').style.right=(28*sc)+'px';

  // p2
  const tb=document.getElementById('p2-title-bar');
  tb.style.paddingLeft=(56*sc)+'px';
  tb.style.paddingRight=(56*sc)+'px';
  tb.style.paddingTop=(SH*.055)+'px';
  tb.style.paddingBottom=(SH*.025)+'px';
  document.getElementById('p2-h2').style.fontSize=(sc*26)+'px';
  document.getElementById('tier-rows').style.paddingLeft=(56*sc)+'px';
  document.getElementById('tier-rows').style.paddingRight=(56*sc)+'px';
  document.getElementById('tier-rows').style.paddingBottom=(SH*.04)+'px';

  buildP2(sc);
  buildDetailPages(sc);
  buildSizeLegend();
  if(p1Ready) drawBubble();
}

// PAGE 2 BUILD
// ══════════════════════════════════════════
function buildP2(sc){
  const container=document.getElementById('tier-rows');
  container.innerHTML='';
  const avatarR = Math.round(SH*.048);
  const badgeW  = Math.round(SW*.085);

  TIER_ORDER.forEach(tierKey=>{
    const cfg=TIER_CFG[tierKey];
    const comps=GROUPED[tierKey];

    const row=document.createElement('div');
    row.className='tier-row';

    // Badge
    const badge=document.createElement('div');
    badge.className='tier-badge';
    badge.style.cssText=`width:${badgeW}px;min-width:${badgeW}px;color:${cfg.color};font-size:${sc*38}px;`;
    badge.innerHTML=`<span class="badge-key">${cfg.key}</span><span class="badge-sub">TIER</span>`;
    row.appendChild(badge);

    // Divider
    const div=document.createElement('div');
    div.className='tier-divider';
    div.style.cssText=`background:${cfg.color}30;margin:${SH*.05}px 0;`;
    row.appendChild(div);

    // Comp cards
    const compsWrap=document.createElement('div');
    compsWrap.className='tier-comps';
    compsWrap.style.paddingLeft=(20*sc)+'px';
    compsWrap.style.gap=(22*sc)+'px';

    comps.forEach(d=>{
      const card=document.createElement('div');
      card.className='comp-card';
      card.style.width=(avatarR*2+40)+'px';

      const av=document.createElement('div');
      av.className='comp-avatar';
      av.style.cssText=`width:${avatarR*2}px;height:${avatarR*2}px;border-color:${cfg.color}55;`;
      const img=document.createElement('img');
      img.src=AVATARS[d.name]||'';
      av.appendChild(img);

      const nm=document.createElement('div');
      nm.className='comp-name';
      nm.style.cssText=`font-size:${sc*9.5}px;max-width:${avatarR*2+36}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
      nm.textContent=d.name;

      const stats=document.createElement('div');
      stats.className='comp-stats';
      stats.style.cssText=`display:flex;flex-direction:column;gap:1px;margin-top:2px;`;
      stats.innerHTML=`
        <span class="stat-chip" style="font-size:${sc*9}px;color:${cfg.color}99">登顶率: ${d.win}%</span>
        <span class="stat-chip" style="font-size:${sc*9}px;color:rgba(255,255,255,.45)">前四率: ${d.top4}%</span>`;

      card.appendChild(av);
      card.appendChild(nm);
      card.appendChild(stats);
      compsWrap.appendChild(card);
    });

    row.appendChild(compsWrap);
    container.appendChild(row);
  });
}

function buildDetailPages(sc){
  TIER_ORDER.forEach((tierKey,idx)=>{
    const cfg=TIER_CFG[tierKey];
    const comps=GROUPED[tierKey];
    const container=document.getElementById(`di-${tierKey}`);
    container.innerHTML='';

    const leftW = SW * 0.30;
    const rightPL = SW * 0.055;
    const totalComps = comps.length;
    const availH = SH * 0.72;
    const minItemH = Math.round(SH * 0.10);
    const prefItemH = Math.round(SH * 0.155);
    const itemH = totalComps > 0 ? Math.max(minItemH, Math.min(prefItemH, Math.floor(availH / totalComps))) : prefItemH;
    const avatarSz = Math.round(itemH * 0.68);
    const visibleComps = comps;

    // ── Left panel ──
    const left=document.createElement('div');
    left.className='detail-left';
    left.style.cssText=`width:${leftW}px;min-width:${leftW}px;padding-left:${SW*.075}px;`;

    const label=document.createElement('div');
    label.className='detail-tier-label';
    label.style.fontSize=(sc*80)+'px';
    label.innerHTML=`<span class="tier-key" style="color:${cfg.color}">${cfg.key}</span><span class="tier-zh">阵容</span>`;

    const desc=document.createElement('div');
    desc.className='detail-tier-desc';
    desc.style.fontSize=(sc*13.5)+'px';
    desc.innerHTML=cfg.desc.join('<br>');

    left.appendChild(label);
    left.appendChild(desc);

    // ── Vertical line ──
    const line=document.createElement('div');
    line.className='detail-left-line';
    line.style.cssText=`background:linear-gradient(to bottom,transparent,${cfg.color}40,transparent);margin:${SH*.12}px ${SW*.032}px;`;

    // ── Right panel ──
    const right=document.createElement('div');
    right.className='detail-right';
    right.style.paddingLeft=rightPL+'px';

    visibleComps.forEach((d,i)=>{
      const item=document.createElement('div');
      item.className='detail-comp-item';
      item.style.cssText=`height:${itemH}px;gap:${sc*18}px;`;

      const av=document.createElement('div');
      av.className='detail-avatar';
      av.style.cssText=`width:${avatarSz}px;height:${avatarSz}px;border-radius:${sc*10}px;`;
      const img=document.createElement('img');
      img.src=AVATARS[d.name]||'';
      av.appendChild(img);

      const info=document.createElement('div');
      info.className='detail-comp-info';

      const nm=document.createElement('div');
      nm.className='detail-comp-name';
      nm.style.fontSize=(sc*17)+'px';
      nm.textContent=d.name;

      const desc2=document.createElement('div');
      desc2.className='detail-comp-desc';
      desc2.style.fontSize=(sc*12.5)+'px';
      desc2.textContent='——';  // placeholder

      const tags=document.createElement('div');
      tags.className='detail-comp-tags';

      const diffTag=document.createElement('span');
      diffTag.className='tag';
      diffTag.style.cssText=`background:${d.diff.bg};color:${d.diff.color};font-size:${sc*10}px;`;
      diffTag.textContent='上分'+d.diff.label;

      const winTag=document.createElement('span');
      winTag.className='tag';
      winTag.style.cssText=`background:rgba(200,168,75,.1);color:#C8A84B99;font-size:${sc*10}px;`;
      winTag.textContent='登顶 '+d.win+'%';

      const top4Tag=document.createElement('span');
      top4Tag.className='tag';
      top4Tag.style.cssText=`background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);font-size:${sc*10}px;`;
      top4Tag.textContent='前四 '+d.top4+'%';

      tags.appendChild(diffTag);
      tags.appendChild(winTag);
      tags.appendChild(top4Tag);

      info.appendChild(nm);
      info.appendChild(desc2);
      info.appendChild(tags);

      item.appendChild(av);
      item.appendChild(info);
      right.appendChild(item);
    });

    container.appendChild(left);
    container.appendChild(line);
    container.appendChild(right);
  });
}

// ══════════════════════════════════════════
// PAGE NAVIGATION
// ══════════════════════════════════════════
const PAGES = ['p1','p2','p3','p4','p5','p6'];
let currentPage = 0;

// 页面切换函数
function navigatePage(direction) {
  const prev = document.getElementById(PAGES[currentPage]);
  
  if (direction === 'next') {
    currentPage = (currentPage + 1) % PAGES.length;
  } else if (direction === 'prev') {
    currentPage = (currentPage - 1 + PAGES.length) % PAGES.length;
  }
  
  const next = document.getElementById(PAGES[currentPage]);
  prev.classList.remove('active');
  next.classList.add('active');
}

// 点击导航点切换到下一页
document.getElementById('nav-dot').addEventListener('click', () => {
  navigatePage('next');
});

// 键盘事件监听 - 小键盘左右键翻页
document.addEventListener('keydown', (event) => {
  // 小键盘的左右键键码
  const keyNumLeft = 100;  // 小键盘4（左键）
  const keyNumRight = 102; // 小键盘6（右键）
  
  // 标准键盘的左右键键码
  const keyLeft = 37;  // 箭头左键
  const keyRight = 39; // 箭头右键
  
  if (event.keyCode === keyNumLeft || event.keyCode === keyLeft) {
    // 小键盘左键或箭头左键：上一页
    event.preventDefault();
    navigatePage('prev');
  } else if (event.keyCode === keyNumRight || event.keyCode === keyRight) {
    // 小键盘右键或箭头右键：下一页
    event.preventDefault();
    navigatePage('next');
  }
});

// ══════════════════════════════════════════
// BUBBLE CHART (Page 1)
// ══════════════════════════════════════════
let activeTier='ALL', viewState={xMin:0,xMax:0.70,yMin:6,yMax:26};
let targetView={...viewState}, animT=0, animDur=55;
let bubbles=[], breathT=0, hoveredIdx=-1;
const canvas=document.getElementById('chart');
const ctx=canvas.getContext('2d');
let p1Ready=false;

const PAD={top:0,right:60,bottom:52,left:58};
let headerH,chartTop,chartBot,chartLeft,chartRight;

function getChartBounds(){
  const sc=SW/1280;
  headerH=SH*.13;
  chartTop=headerH+SH*.04;
  chartBot=SH-SH*.08;
  chartLeft=PAD.left*sc;
  chartRight=SW-PAD.right*sc;
}

function lerp(a,b,t){return a+(b-a)*t;}
function easeIO(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function toPixel(xv,yv,v){
  v=v||viewState;
  return[lerp(chartLeft,chartRight,(xv-v.xMin)/(v.xMax-v.xMin)),
         lerp(chartBot,chartTop,(yv-v.yMin)/(v.yMax-v.yMin))];
}
function bubbleR(top4){
  const mn=Math.min(...DATA.map(d=>d.top4)),mx=Math.max(...DATA.map(d=>d.top4));
  const span=(viewState.xMax-viewState.xMin)+(viewState.yMax-viewState.yMin);
  const base=lerp(15,46,(Math.sqrt(top4)-Math.sqrt(mn))/(Math.sqrt(mx)-Math.sqrt(mn)));
  return base*Math.max(.6,Math.min(1.55,56/span));
}
const FULL_VIEW={xMin:0,xMax:0.70,yMin:6,yMax:26};
function computeFilterView(tier){
  const sub=DATA.filter(d=>d.tier===tier);
  if(!sub.length)return FULL_VIEW;
  const xs=sub.map(d=>d.play),ys=sub.map(d=>d.win);
  const xp=Math.max((Math.max(...xs)-Math.min(...xs))*.55,0.06);
  const yp=Math.max((Math.max(...ys)-Math.min(...ys))*.55,2.5);
  return{xMin:Math.max(0,Math.min(...xs)-xp),xMax:Math.min(0.75,Math.max(...xs)+xp),
         yMin:Math.max(0,Math.min(...ys)-yp),yMax:Math.min(28,Math.max(...ys)+yp)};
}
function setView(v){targetView=v;animT=0;}
function niceStep(range,n){
  const raw=range/n,mag=Math.pow(10,Math.floor(Math.log10(raw)));
  return[1,2,2.5,5,10].map(f=>f*mag).find(s=>s>=raw)||mag*10;
}

const ATC='rgba(160,170,200,0.90)',ALC='rgba(180,190,215,0.85)',QC='rgba(200,168,75,0.55)';

function drawBubble(){
  getChartBounds();
  const c=ctx;
  c.save();c.scale(DPR,DPR);
  c.clearRect(0,0,SW,SH);
  c.fillStyle='#0A0C14';c.fillRect(0,0,SW,SH);
  const v=viewState,sc=SW/1280;
  const xStep=niceStep(v.xMax-v.xMin,6),yStep=niceStep(v.yMax-v.yMin,5);
  c.save();c.strokeStyle='rgba(255,255,255,.04)';c.lineWidth=1;
  for(let x=Math.ceil(v.xMin/xStep)*xStep;x<=v.xMax+.001;x=+(x+xStep).toFixed(6)){
    const[px]=toPixel(x,0);c.beginPath();c.moveTo(px,chartTop);c.lineTo(px,chartBot);c.stroke();
  }
  for(let y=Math.ceil(v.yMin/yStep)*yStep;y<=v.yMax+.001;y=+(y+yStep).toFixed(6)){
    const[,py]=toPixel(0,y);c.beginPath();c.moveTo(chartLeft,py);c.lineTo(chartRight,py);c.stroke();
  }
  c.restore();
  const XS=0.30,YS=16;
  if(XS>v.xMin&&XS<v.xMax&&YS>v.yMin&&YS<v.yMax){
    const[qx,qy]=toPixel(XS,YS);
    c.save();c.strokeStyle='rgba(200,168,75,.28)';c.lineWidth=1.2;c.setLineDash([6,5]);
    c.beginPath();c.moveTo(qx,chartTop);c.lineTo(qx,chartBot);c.stroke();
    c.beginPath();c.moveTo(chartLeft,qy);c.lineTo(chartRight,qy);c.stroke();
    c.setLineDash([]);
    c.font=`500 ${sc*13}px 'Noto Sans SC',sans-serif`;
    c.fillStyle=QC;c.textAlign='center';
    c.fillText('冷门高上限',(chartLeft+qx)/2,chartTop+22);
    c.fillText('热门强势',(qx+chartRight)/2,chartTop+22);
    c.fillText('冷门低上限',(chartLeft+qx)/2,chartBot-12);
    c.fillText('热门但登顶难',(qx+chartRight)/2,chartBot-12);
    c.restore();
  }
  c.save();c.strokeStyle='rgba(255,255,255,.18)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(chartLeft,chartTop);c.lineTo(chartLeft,chartBot);c.stroke();
  c.beginPath();c.moveTo(chartLeft,chartBot);c.lineTo(chartRight,chartBot);c.stroke();
  const tF=sc*13;
  c.font=`600 ${tF}px 'Rajdhani',sans-serif`;c.fillStyle=ATC;c.textAlign='center';
  for(let x=Math.ceil(v.xMin/xStep)*xStep;x<=v.xMax+.001;x=+(x+xStep).toFixed(6)){
    const[px]=toPixel(x,0);c.fillText(x.toFixed(2),px,chartBot+20);
  }
  c.textAlign='right';
  for(let y=Math.ceil(v.yMin/yStep)*yStep;y<=v.yMax+.001;y=+(y+yStep).toFixed(6)){
    const[,py]=toPixel(0,y);c.fillText(y.toFixed(0)+'%',chartLeft-9,py+4.5);
  }
  c.fillStyle=ALC;c.font=`400 ${sc*12.5}px 'Noto Sans SC',sans-serif`;c.textAlign='center';
  c.fillText('出场率（均摊人次）→',(chartLeft+chartRight)/2,chartBot+42);
  c.save();c.translate(chartLeft-46,(chartTop+chartBot)/2);c.rotate(-Math.PI/2);c.textAlign='center';
  c.fillText('登顶率 →（越高上限越强）',0,0);c.restore();
  c.restore();

  bubbles=[];
  const breath=1+Math.sin(breathT*.018)*.018;
  DATA.forEach((d,i)=>{
    const dimmed=activeTier!=='ALL'&&d.tier!==activeTier;
    const[cx,cy]=toPixel(d.play,d.win);
    const r=bubbleR(d.top4)*breath;
    bubbles.push({d,cx,cy,r,dimmed});
    const col=TIER_CFG[d.tier].color;
    const alpha=dimmed?.09:(hoveredIdx===i?1:.88);
    c.save();c.globalAlpha=alpha;
    c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fillStyle=col;c.fill();
    c.beginPath();c.arc(cx,cy-r*.2,r*.68,Math.PI*1.08,Math.PI*1.92);
    c.strokeStyle='rgba(255,255,255,.17)';c.lineWidth=r*.11;c.stroke();
    c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.strokeStyle=col+'99';c.lineWidth=1.4;c.stroke();
    if(d.img&&d.img.complete&&d.img.naturalWidth>0){
      c.save();c.beginPath();c.arc(cx,cy,r*.72,0,Math.PI*2);c.clip();
      const s=r*1.44;c.drawImage(d.img,cx-s/2,cy-s/2,s,s);
      const vg=ctx.createRadialGradient(cx,cy,r*.4,cx,cy,r*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.28)');
      c.fillStyle=vg;c.beginPath();c.arc(cx,cy,r*.72,0,Math.PI*2);c.fill();
      c.restore();
    }
    c.restore();
    if(hoveredIdx===i){
      c.save();c.beginPath();c.arc(cx,cy,r+5,0,Math.PI*2);
      c.strokeStyle=col;c.lineWidth=1.8;c.globalAlpha=.55;c.stroke();c.restore();
    }
    if(!dimmed){
      c.save();
      c.font=`700 ${sc*12}px 'Noto Sans SC',sans-serif`;
      const labelX = cx > (chartLeft+chartRight)/2 ? cx-r-8 : cx+r+8;
      const labelAlign = cx > (chartLeft+chartRight)/2 ? 'right' : 'left';
      c.fillStyle='#E0E4EE';c.textAlign=labelAlign;
      c.fillText(d.name,labelX,cy-3);
      c.font=`600 ${sc*10.5}px 'Rajdhani',sans-serif`;
      c.fillStyle=col+'CC';c.fillText(`出场:${d.play.toFixed(2)} 顶:${d.win}%`,labelX,cy+12);
      c.restore();
    }
  });
  c.restore();
}

function loop(){
  if(animT<animDur){
    const s=easeIO(animT/animDur)*.14+.01;
    viewState={xMin:lerp(viewState.xMin,targetView.xMin,s),xMax:lerp(viewState.xMax,targetView.xMax,s),
               yMin:lerp(viewState.yMin,targetView.yMin,s),yMax:lerp(viewState.yMax,targetView.yMax,s)};
    animT++;
  }else{viewState={...targetView};}
  breathT++;
  
  // Update time display every second (60 frames)
  if(breathT % 60 === 0){
    updateCurrentTime();
  }
  
  drawBubble();
  requestAnimationFrame(loop);
}

// tooltip
const tooltipEl=document.getElementById('tooltip');
document.getElementById('p1').addEventListener('mousemove',e=>{
  const rect=stage.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let found=-1;
  for(let i=0;i<bubbles.length;i++){
    const b=bubbles[i];if(b.dimmed)continue;
    if(Math.hypot(mx-b.cx,my-b.cy)<=b.r){found=i;break;}
  }
  hoveredIdx=found;
  if(found>=0){
    const d=bubbles[found].d,tier=TIER_CFG[d.tier];
    tooltipEl.innerHTML=`
      <div class="tt-name" style="color:${tier.color}">${d.name}</div>
      <div class="tt-row"><span>出场率</span><b>${d.play.toFixed(2)}</b></div>
      <div class="tt-row"><span>登顶率</span><b>${d.win}%</b></div>
      <div class="tt-row"><span>前四率</span><b>${d.top4}%</b></div>
      <div class="tt-row"><span>平均排名</span><b>${d.avgRank}</b></div>
      <hr class="tt-divider">
      <div class="tt-diff"><span class="diff-label">上分难度</span>
        <span class="diff-pill" style="background:${d.diff.bg};color:${d.diff.color}">${d.diff.label}</span></div>
      <div><span class="tt-tier" style="background:${tier.color}22;color:${tier.color};border:1px solid ${tier.color}33">${tier.label}</span></div>`;
    let tx=mx+16,ty=my-10;
    if(tx+220>SW-10)tx=mx-236;if(ty+185>SH-10)ty=SH-195;
    tooltipEl.style.left=tx+'px';tooltipEl.style.top=ty+'px';
    tooltipEl.classList.add('show');stage.style.cursor='pointer';
  }else{tooltipEl.classList.remove('show');stage.style.cursor='default';}
});
document.getElementById('p1').addEventListener('mouseleave',()=>{tooltipEl.classList.remove('show');hoveredIdx=-1;});

// filters
const filtersEl=document.getElementById('filters');
Object.entries(TIER_CFG).forEach(([key,val])=>{
  const btn=document.createElement('button');
  btn.className='tier-btn';btn.dataset.tier=key;btn.textContent=key;
  btn.style.color=val.color;btn.style.borderColor=val.color+'55';
  btn.addEventListener('click',()=>toggleTier(key));
  filtersEl.appendChild(btn);
});
document.querySelector('.all-btn').addEventListener('click',()=>{activeTier='ALL';updateBtns();setView(FULL_VIEW);});
function toggleTier(t){
  activeTier=activeTier===t?'ALL':t;
  setView(activeTier==='ALL'?FULL_VIEW:computeFilterView(activeTier));
  updateBtns();
}
function updateBtns(){
  document.querySelectorAll('.tier-btn').forEach(b=>{
    const t=b.dataset.tier,col=TIER_CFG[t].color;
    b.classList.toggle('active',t===activeTier);
    b.classList.toggle('dimmed',activeTier!=='ALL'&&t!==activeTier);
    b.style.background=t===activeTier?col+'22':'transparent';
    b.style.borderColor=t===activeTier?col:col+'44';
  });
  document.querySelector('.all-btn').classList.toggle('active',activeTier==='ALL');
}

function buildSizeLegend(){
  const el=document.getElementById('sl-items');el.innerHTML='';
  const sc=SW/1280;
  [55,65,75].forEach(v=>{
    const r=bubbleR(v)*.9;
    el.innerHTML+=`<div class="sl-item"><div class="sl-circle" style="width:${r*1.1}px;height:${r*1.1}px"></div><span class="sl-label" style="font-size:${sc*8.5}px">${v}%</span></div>`;
  });
}

// Update current time display
function updateCurrentTime(){
  const timeEl = document.getElementById('current-time');
  if(!timeEl) return;
  
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1; // getMonth returns 0-11
  const day = now.getDate();
  
  // Format as "2026-3-11"
  const formattedTime = `${year}-${month}-${day}`;
  timeEl.textContent = formattedTime;
}

// ── init ──
window.addEventListener('resize',resize);
document.fonts.ready.then(()=>{
  p1Ready=true;
  resize();
  updateCurrentTime(); // Initialize time display
  loop();
});
</script>
